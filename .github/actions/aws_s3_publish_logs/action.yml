---
name: "🛠️ AWS S3 Publish Logs"
description: |
  This GitHub Action uploads logs to AWS S3.

inputs:
  S3_BUCKET:
    description: "AWS S3 Bucket"
    required: true
    default: "fdio-logs-s3-cloudfront-index"
    type: string
  S3_PATH:
    description: "AWS S3 Path"
    required: false
    default: "vex-yul-rot-jenkins-1/${{ github.job }}/${{ github.run_id }}/"
    type: string

runs:
  using: "composite"
  steps:
#    - name: "Upload Logs to S3 bucket"
#      run: |
#        python3 bootstrap_publish_logs.py deploy_s3 ${{ inputs.S3_BUCKET }} '${{ inputs.S3_PATH }}' '${{ github.workspace }}"

    - name: Check if AWS CLI is pre-installed
      id: aws-binary-check
      shell: bash
      run: |
        if command -v aws >/dev/null 2>&1; then
            echo "AWS CLI is already installed. Skipping install."
            echo "AWS_CLI_PREINSTALLED=true" >> "$GITHUB_OUTPUT"
            aws --version
            exit 0
        fi
        echo "AWS_CLI_PREINSTALLED=false" >> "$GITHUB_OUTPUT"

    - name: Cache or Restore the zip
      if: ${{ steps.aws-binary-check.outputs.AWS_CLI_PREINSTALLED == 'false' }}
      uses: actions/cache@v4
      id: aws-cli-cache
      with:
        path: ${{ runner.temp }}/aws-cli-cache/*.zip
        key: ${{ runner.os }}-${{ runner.arch }}-aws-cli-v2-zip

    - name: Install AWS CLI
      shell: bash
      if: ${{ steps.aws-binary-check.outputs.AWS_CLI_PREINSTALLED == 'false' }}
      env:
        CACHE_HIT: ${{ steps.aws-cli-cache.outputs.cache-hit == 'true' }}
        CACHE_ENABLED: 'true'
        CACHE_PATH: ${{ runner.temp }}/aws-cli-cache
      run: |
        ZIP_FILE_NAME="awscli-exe-linux-$(uname -m).zip"

        mkdir -p "$CACHE_PATH"
        cd "$CACHE_PATH"

        curl -fsSL --retry 3 --retry-delay 5 --connect-timeout 15 --max-time 60 -o "$ZIP_FILE_NAME" "https://awscli.amazonaws.com/$ZIP_FILE_NAME"

        unzip -o -q "$ZIP_FILE_NAME"
        sudo ./aws/install --update
        rm -rf ./aws

    - name: Upload to S3
      shell: bash
      run: |
        echo "s3 cp ${{ github.workspace }} s3://${{ inputs.S3_BUCKET }}/${{ inputs.S3_PATH }}"
