---
name: "🛠️ AWS S3 Publish Logs"
description: |
  This GitHub Action uploads logs to AWS S3.

inputs:
  S3_BUCKET:
    description: "AWS S3 Bucket"
    required: true
    default: "fdio-logs-s3-cloudfront-index"
    type: string
  S3_PATH:
    description: "AWS S3 Path"
    required: false
    default: "vex-yul-rot-jenkins-1/${{ github.job }}/${{ github.run_id }}/"
    type: string
  ARCHIVES_PATH:
    description: "AWS S3 Path"
    required: false
    default: "${{ github.workspace }}/archives/"
    type: string

runs:
  using: "composite"
  steps:
    - name: Check if AWS CLI is pre-installed
      id: aws-binary-check
      shell: bash
      run: |
        if command -v aws >/dev/null 2>&1; then
            echo "AWS CLI is already installed. Skipping install."
            echo "AWS_CLI_PREINSTALLED=true" >> "$GITHUB_OUTPUT"
            aws --version
            exit 0
        fi
        echo "AWS_CLI_PREINSTALLED=false" >> "$GITHUB_OUTPUT"

    - name: Cache or Restore the zip
      if: ${{ steps.aws-binary-check.outputs.AWS_CLI_PREINSTALLED == 'false' }}
      uses: actions/cache@v4
      id: aws-cli-cache
      with:
        path: ${{ runner.temp }}/aws-cli-cache/*.zip
        key: ${{ runner.os }}-${{ runner.arch }}-aws-cli-v2-zip

    - name: Install AWS CLI
      shell: bash
      if: ${{ steps.aws-binary-check.outputs.AWS_CLI_PREINSTALLED == 'false' }}
      env:
        CACHE_HIT: ${{ steps.aws-cli-cache.outputs.cache-hit == 'true' }}
        CACHE_ENABLED: 'true'
        CACHE_PATH: ${{ runner.temp }}/aws-cli-cache
      run: |
        ZIP_FILE_NAME="awscli-exe-linux-$(uname -m).zip"

        mkdir -p "$CACHE_PATH"
        cd "$CACHE_PATH"

        curl -fsSL --retry 3 --retry-delay 5 --connect-timeout 15 --max-time 60 -o "$ZIP_FILE_NAME" "https://awscli.amazonaws.com/$ZIP_FILE_NAME"

        unzip -o -q "$ZIP_FILE_NAME"
        sudo ./aws/install --update
        rm -rf ./aws

    - name: Upload archives directory content to S3
      shell: bash
      run: |
        echo "s3 cp ${{ github.workspace }}/archives s3://${{ inputs.S3_BUCKET }}/${{ inputs.S3_PATH }}"

        # Usage: ./upload.sh /path/to/dir s3://my-bucket-name
        SRC_DIR="${{ inputs.ARCHIVES_PATH }}"

        # Guess MIME type from file extension
        get_content_type() {
          local file_ext="${1##*.}"
          case "$file_ext" in
            html) echo "text/html" ;;
            css)  echo "text/css" ;;
            js)   echo "application/javascript" ;;
            json) echo "application/json" ;;
            xml)  echo "application/xml" ;;
            txt)  echo "text/plain" ;;
            csv)  echo "text/csv" ;;
            jpg|jpeg) echo "image/jpeg" ;;
            png) echo "image/png" ;;
            gif) echo "image/gif" ;;
            svg) echo "image/svg+xml" ;;
            pdf) echo "application/pdf" ;;
            md)  echo "text/markdown" ;;
            *)   echo "application/octet-stream" ;;
          esac
        }

        export -f get_content_type

        # Traverse and upload
        find "$SRC_DIR" -type f | while read -r file; do
          rel_path="${file#$SRC_DIR/}"        # relative path
          tmp_file="$(mktemp).gz"             # temp gzip file
          gzip -c "$file" > "$tmp_file"       # compress

          content_type=$(get_content_type "$file")

          echo "Uploading $rel_path.gz -> ${{ inputs.S3_BUCKET }}/${{ inputs.S3_PATH }}/$rel_path.gz (Content-Type: $content_type, gzip)"
          #aws s3 cp "$tmp_file" "$S3_BUCKET/$rel_path.gz" \
          #  --content-type "$content_type" \
          #  --content-encoding "gzip"

          rm -f "$tmp_file"
        done

