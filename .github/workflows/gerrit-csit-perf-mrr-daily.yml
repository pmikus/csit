---
name: csit-vpp-perf-mrr-daily

# yamllint disable-line rule:truthy
on:
  # Runs periodically
  #schedule:
  #  - cron:  "30 22 * * 0-4"
  workflow_dispatch:
    inputs:
      TARGET_REPO:
        # yamllint disable-line rule:line-length
        description: "The target GitHub repository needing the required workflow"
        required: true
        type: string

jobs:
  csit-vpp-perf-mrr-daily:
    name: csit-vpp-perf-mrr-daily-master-${{ matrix.node }}
    runs-on:
      - self-hosted
      - nomad
      - fdio:arch=${{ matrix.executor_arch }}
      - fdio:class=builder
      - fdio:namespace=sandbox
      - fdio:os=${{ matrix.os }}

    strategy:
      matrix:
        include:
          #- node: "2n-aws"
          #  os: ubuntu2404
          #  executor_arch: x86_64
          #- node: "2n-c6in"
          #  os: ubuntu2404
          #  executor_arch: x86_64
          #- node: "2n-c7gn"
          #  os: ubuntu2404
          #  executor_arch: aarch64
          - node: "2n-icx"
            os: ubuntu2404
            executor_arch: x86_64
          - node: "2n-grc"
            os: ubuntu2404
            executor_arch: aarch64

    env:
      JOB_NAME: "${{ github.job }}"

    steps:
      - name: Gerrit Checkout
        # yamllint disable-line rule:line-length
        uses: lfit/checkout-gerrit-change-action@54d751e8bd167bc91f7d665dabe33fae87aaaa63 # v0.9
        with:
          gerrit-refspec: refs/heads/master
          gerrit-project: "csit"
          gerrit-url: ${{ vars.GERRIT_URL }}
          delay: "0s"
          repository: ${{ inputs.TARGET_REPO }}
          ref: refs/heads/master

      - name: "Retrieve GIT commit message"
        uses: lfit/releng-reusable-workflows/.github/actions/git-commit-message-action@main

      - name: Setup Environment
        uses: pmikus/csit/.github/actions/setup_executor_env@master

      - name: Run Verify Performance
        run: |
          echo ${{ env.JOB_NAME }}
          #source ./resources/libraries/bash/entry/bootstrap_verify_perf.sh"

      - name: Archive Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.JOB_NAME }}-${{ github.run_number }}
          path: archives/
          if-no-files-found: "ignore"